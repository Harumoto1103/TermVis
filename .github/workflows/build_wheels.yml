name: Build and Publish

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Building for standard OS runners
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Linux build: Using manylinux_2_28 (AlmaLinux 8)
      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        env:
          LIBCLANG_PATH: /usr/lib64
        with:
          command: build
          args: --release --out dist
          manylinux: 2_28
          # Use yum for reliable package management in manylinux containers
          before-script-linux: |
            yum install -y clang-devel llvm-devel opencv-devel

      # Windows build: vcpkg ensures all DLLs and Libs are correctly matched
      - name: Install OpenCV (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install opencv4:x64-windows
          vcpkg integrate install

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist

      # macOS build: Homebrew-based environment with explicit clang linking
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install opencv llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: Build wheels (macOS)
        if: runner.os == 'macOS'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist

      - name: Upload built wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/v')"
    needs: [build_wheels]
    steps:
      - name: Download all built wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Upload to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
