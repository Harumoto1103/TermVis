name: Build and Publish

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # We build on Ubuntu, Windows, and macOS
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter python3.8 python3.9 python3.10 python3.11 python3.12
          # Use manylinux_2_28 for better compatibility with modern dependencies
          manylinux: 2_28
          # Install dependencies INSIDE the manylinux container
          before-script-linux: |
            dnf install -y clang opencv-devel

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter python3.8 python3.9 python3.10 python3.11 python3.12
        env:
          # Windows runners already have vcpkg, we help the opencv crate find it
          OPENCV_LINK_LIBS: opencv_world4
          # Try to use pre-installed vcpkg if available to save time
          VCPKG_ROOT: C:/vcpkg

      - name: Build wheels (macOS)
        if: runner.os == 'macOS'
        run: brew install opencv
      
      - name: Build wheels (macOS action)
        if: runner.os == 'macOS'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter python3.8 python3.9 python3.10 python3.11 python3.12

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/v')"
    needs: [build_wheels]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
